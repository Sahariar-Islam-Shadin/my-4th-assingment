<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <!-- favicon icons -->
    <link rel="shortcut icon" href="./jobs.png" type="image/x-icon">

    <!-- taiwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&family=Saira:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
</head>

<body class="bg-gray-100">
    <!-- nav section -->
    <header class="w-[80%] mx-auto">
        <h1 class="text-4xl font-bold py-6">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="bg-white p-4 rounded-lg">
                <p>Total</p>
                <p id="totalCount" class="font-bold">0</p>
            </div>
            <div class="bg-white p-4 rounded-lg">
                <p>Interview</p>
                <p id="interviewCount" class="text-green-500 font-bold"> <span>0</span></p>
            </div>
            <div class="bg-white p-4 rounded-lg">
                <p>Rejected</p>
                <p id="rejectCount" class="text-red-500 font-bold"> <span>0</span></p>
            </div>
        </div>
    </header>
    <hr class="w-[80%] text-gray-300 mx-auto my-5">
    <main class="w-[80%] mx-auto">
